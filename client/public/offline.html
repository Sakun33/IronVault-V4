<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureVault - Offline</title>
  <meta name="theme-color" content="#6366f1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; 
      background: #0f0f23;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    
    .container {
      max-width: 400px;
      width: 100%;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      background: #6366f1;
      border-radius: 20px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    
    h1 { 
      color: #6366f1; 
      margin-bottom: 1rem;
      font-size: 1.75rem;
      font-weight: 600;
    }
    
    .subtitle {
      color: #a1a1aa; 
      margin-bottom: 2rem;
      font-size: 1rem;
      line-height: 1.5;
    }
    
    .features {
      background: #1f1f37;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    
    .features h3 {
      color: #6366f1;
      font-size: 1rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    
    .features ul {
      list-style: none;
      space-y: 0.5rem;
    }
    
    .features li {
      color: #e4e4e7;
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      font-size: 0.875rem;
    }
    
    .features li::before {
      content: '🔒';
      margin-right: 0.75rem;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 0.875rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    button:hover { 
      background: #5145cd;
    }
    
    .secondary {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
    }
    
    .secondary:hover {
      background: #374151;
      color: #ffffff;
    }
    
    .status {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #1f1f37;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #a1a1aa;
    }
    
    .online {
      background: #065f46;
      color: #10b981;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 1rem;
      }
      
      .logo {
        width: 64px;
        height: 64px;
        font-size: 1.5rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔒</div>
    <h1>SecureVault</h1>
    <p class="subtitle">You're currently offline, but your encrypted vault data is still accessible locally.</p>
    
    <div class="features">
      <h3>Available Offline:</h3>
      <ul>
        <li>View saved passwords</li>
        <li>Access subscription details</li> 
        <li>Generate secure passwords</li>
        <li>All data remains encrypted</li>
      </ul>
    </div>
    
    <div class="actions">
      <button onclick="goToApp()" id="open-app">
        📱 Open SecureVault
      </button>
      <button class="secondary" onclick="checkConnection()" id="retry-btn">
        🔄 Check Connection
      </button>
    </div>
    
    <div class="status" id="status">
      <span id="connection-status">Offline mode active</span>
    </div>
  </div>

  <script>
    // Check connection status
    function updateConnectionStatus() {
      const status = document.getElementById('connection-status');
      const statusContainer = document.getElementById('status');
      
      if (navigator.onLine) {
        status.textContent = 'Connection restored! You can access all features.';
        statusContainer.className = 'status online';
      } else {
        status.textContent = 'Offline mode active - your data is secure locally';
        statusContainer.className = 'status';
      }
    }
    
    // Navigate to main app
    function goToApp() {
      if ('serviceWorker' in navigator) {
        // Check if we can access the main app
        fetch('/')
          .then(() => {
            window.location.href = '/';
          })
          .catch(() => {
            // Force navigate even if fetch fails
            window.location.href = '/';
          });
      } else {
        window.location.href = '/';
      }
    }
    
    // Check connection and reload if online
    function checkConnection() {
      const retryBtn = document.getElementById('retry-btn');
      retryBtn.textContent = '⏳ Checking...';
      retryBtn.disabled = true;
      
      // Simple connectivity check
      fetch('/manifest.json', { cache: 'no-cache' })
        .then(response => {
          if (response.ok) {
            window.location.href = '/';
          } else {
            throw new Error('Still offline');
          }
        })
        .catch(() => {
          setTimeout(() => {
            retryBtn.textContent = '🔄 Check Connection';
            retryBtn.disabled = false;
            updateConnectionStatus();
          }, 1000);
        });
    }
    
    // Listen for online/offline events
    window.addEventListener('online', () => {
      updateConnectionStatus();
      // Auto-reload when back online
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
    });
    
    window.addEventListener('offline', updateConnectionStatus);
    
    // Initialize status
    updateConnectionStatus();
    
    // Auto-retry connection every 30 seconds
    setInterval(() => {
      if (!navigator.onLine) {
        fetch('/manifest.json', { cache: 'no-cache' })
          .then(response => {
            if (response.ok) {
              updateConnectionStatus();
            }
          })
          .catch(() => {
            // Still offline, do nothing
          });
      }
    }, 30000);
  </script>
</body>
</html>
