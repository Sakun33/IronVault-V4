name: Mobile Build

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'both'
        type: choice
        options: [ios, android, both]

jobs:
  android-build:
    name: Android AAB
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform != 'ios' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: npm ci --legacy-peer-deps
      - run: npm run build:prod
        env:
          VITE_REVENUECAT_API_KEY_IOS: ${{ secrets.VITE_REVENUECAT_API_KEY_IOS }}
          VITE_REVENUECAT_API_KEY_ANDROID: ${{ secrets.VITE_REVENUECAT_API_KEY_ANDROID }}
      - run: npx cap sync android
      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/ironvault-release.keystore
      - name: Build AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/ironvault-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: ironvault-android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
      - name: Upload to Play Store (Internal)
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ironvault.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal

  ios-build:
    name: iOS IPA
    runs-on: macos-14
    if: ${{ github.event.inputs.platform != 'android' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build:prod
        env:
          VITE_REVENUECAT_API_KEY_IOS: ${{ secrets.VITE_REVENUECAT_API_KEY_IOS }}
          VITE_REVENUECAT_API_KEY_ANDROID: ${{ secrets.VITE_REVENUECAT_API_KEY_ANDROID }}
      - run: npx cap sync ios
      - working-directory: ios/App
        run: pod install
      - name: Import signing cert
        env:
          CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERT_PW: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "$KC_PW" $KC
          security set-keychain-settings -lut 21600 $KC
          security unlock-keychain -p "$KC_PW" $KC
          echo "$CERT_B64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERT_PW" -A -t cert -f pkcs12 -k $KC
          security list-keychain -d user -s $KC
      - name: Import provisioning profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o $RUNNER_TEMP/pp.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles
      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ironvault.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PLACEHOLDER_TEAM_ID</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST
          sed -i '' "s/PLACEHOLDER_TEAM_ID/${{ secrets.APPLE_TEAM_ID }}/" $RUNNER_TEMP/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ironvault.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ironvault-ipa
      - uses: actions/upload-artifact@v4
        with:
          name: ironvault-ios-ipa
          path: ${{ runner.temp }}/ironvault-ipa/*.ipa
      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/ironvault-ipa/*.ipa \
            --type ios \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }} \
            --apiKeyPath $RUNNER_TEMP/AuthKey.p8
